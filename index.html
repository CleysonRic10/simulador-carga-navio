<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador Naval - Grid 3x3 Progressivo</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial; background: #1a1a1a; }
        .painel {
            position: fixed; top: 15px; left: 15px; background: rgba(255,255,255,0.95);
            padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 8px; z-index: 10; width: 280px;
        }
        .linha { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        input { width: 65px; padding: 5px; border: 1px solid #bbb; border-radius: 4px; text-align: center; font-weight: bold; }
        label { font-size: 11px; font-weight: bold; color: #2c3e50; text-transform: uppercase; }
        .secao-titulo { border-bottom: 2px solid #2980b9; margin-top: 10px; font-size: 12px; color: #2980b9; font-weight: bold; padding-bottom: 3px; }
        .status-box { background: #2c3e50; color: #ecf0f1; padding: 8px; border-radius: 4px; font-size: 11px; text-align: center; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="painel">
    <div class="secao-titulo">ESTADO DA EMBARCAÇÃO</div>
    <div id="statusTxt" class="status-box">Calculando...</div>
    
    <div class="secao-titulo">4 PORÕES (Grid 3x3 Interno)</div>
    <div class="linha"><label>P1 (POPA)</label><input id="p1" type="number" value="0" min="0" max="90"></div>
    <div class="linha"><label>P2 (M-POPA)</label><input id="p2" type="number" value="0" min="0" max="90"></div>
    <div class="linha"><label>P3 (M-PROA)</label><input id="p3" type="number" value="0" min="0" max="90"></div>
    <div class="linha"><label>P4 (PROA)</label><input id="p4" type="number" value="0" min="0" max="90"></div>
    
    <div class="secao-titulo" style="color: #2980b9;">LASTRO</div>
    <div class="linha"><label>L1 (ASA-BB)</label><input id="lastro1" type="number" value="150"></div>
    <div class="linha"><label>L2 (ASA-BE)</label><input id="lastro2" type="number" value="150"></div>

    <div class="secao-titulo">NAVEGAÇÃO</div>
    <div class="linha"><label>Rumo (Giro)</label><input id="rotY" type="number" value="0"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xddeeff);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(1100, 900, 1300);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(300, 800, 400);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const seaGeo = new THREE.PlaneGeometry(8000, 8000, 40, 40);
const sea = new THREE.Mesh(seaGeo, new THREE.MeshPhongMaterial({ color: 0x1e5491, transparent: true, opacity: 0.6, wireframe: true }));
sea.rotation.x = -Math.PI / 2;
scene.add(sea);

const navioPivot = new THREE.Group();
scene.add(navioPivot);
const cascoVisual = new THREE.Group();
navioPivot.add(cascoVisual);

const shape = new THREE.Shape();
shape.moveTo(-140, 100); shape.lineTo(140, 100); shape.lineTo(130, 50);
shape.lineTo(100, -100); shape.lineTo(0, -120); shape.lineTo(-100, -100);
shape.lineTo(-130, 50); shape.lineTo(-140, 100);

const geometry = new THREE.ExtrudeGeometry(shape, { depth: 20, bevelEnabled: false });
geometry.center();
const casco = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0xfafafa, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
casco.scale.set(2.5, 1, 85); 
cascoVisual.add(casco);

const casario = new THREE.Mesh(new THREE.BoxGeometry(180, 140, 160), new THREE.MeshStandardMaterial({ color: 0x777777 }));
casario.position.set(0, 170, -700); 
cascoVisual.add(casario);

/* ESTRUTURAS DE CARRA (GRID 3x3) */
const poroesFisicos = []; // Armazenará os 4 grupos de porões
const listaLastros = [];
const alturaMaxCarga = 140;
const configPoroesZ = [400, 100, -200, -450]; 

function criarMundoInterno() {
    configPoroesZ.forEach((z, pIdx) => {
        const grupoPorao = new THREE.Group();
        grupoPorao.position.set(0, -100, z);
        cascoVisual.add(grupoPorao);
        
        const celulas = [];
        const dimX = 180 / 3;
        const dimZ = 200 / 3;

        for (let i = 0; i < 3; i++) { // Colunas (BB para BE)
            for (let j = 0; j < 3; j++) { // Linhas (Popa para Proa)
                const posX = (i - 1) * dimX;
                const posZ = (j - 1) * dimZ;
                
                // Wireframe da célula
                const geoVazia = new THREE.BoxGeometry(dimX-4, alturaMaxCarga, dimZ-4);
                const container = new THREE.Mesh(geoVazia, new THREE.MeshStandardMaterial({ color: 0x8B4513, wireframe: true, transparent: true, opacity: 0.1 }));
                container.position.set(posX, alturaMaxCarga/2, posZ);
                grupoPorao.add(container);

                // Volume de carga real
                const geoCarga = new THREE.BoxGeometry(dimX-6, alturaMaxCarga, dimZ-6);
                const cMesh = new THREE.Mesh(geoCarga, new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                cMesh.geometry.translate(0, alturaMaxCarga/2, 0);
                cMesh.position.set(posX, 0, posZ);
                cMesh.scale.y = 0.001;
                grupoPorao.add(cMesh);
                celulas.push(cMesh);
            }
        }
        poroesFisicos.push(celulas);
    });

    [-200, 200].forEach(x => {
        const grupo = new THREE.Group();
        grupo.position.set(x, -100, 0);
        cascoVisual.add(grupo);
        const lMesh = new THREE.Mesh(new THREE.BoxGeometry(48, alturaMaxCarga, 1698), new THREE.MeshStandardMaterial({ color: 0x00aaff }));
        lMesh.geometry.translate(0, alturaMaxCarga/2, 0);
        lMesh.scale.y = 0.001;
        grupo.add(lMesh);
        listaLastros.push(lMesh);
    });
}
criarMundoInterno();

function atualizar() {
    const valoresPoroes = ["p1", "p2", "p3", "p4"].map(id => parseFloat(document.getElementById(id).value) || 0);
    const l = ["lastro1", "lastro2"].map(id => parseFloat(document.getElementById(id).value) || 0);
    const rumo = parseFloat(document.getElementById('rotY').value) || 0;

    // Lógica de Preenchimento Sequencial 10u por célula
    valoresPoroes.forEach((valorTotal, pIdx) => {
        let restante = valorTotal;
        poroesFisicos[pIdx].forEach((celula, cIdx) => {
            const cargaNestaCelula = Math.min(restante, 10);
            celula.scale.y = Math.max(0.001, cargaNestaCelula / 10);
            restante -= cargaNestaCelula;
        });
    });

    const pesoCarga = valoresPoroes.reduce((a, b) => a + b, 0);
    const pesoTotal = pesoCarga + l.reduce((a, b) => a + b, 0) + 350;

    navioPivot.rotation.y = THREE.MathUtils.degToRad(rumo);
    navioPivot.position.y = (450 - pesoTotal) * 0.18;

    const banda = (l[0] - l[1]) * 0.07; 
    const trim = ((valoresPoroes[0] + valoresPoroes[1]) - (valoresPoroes[2] + valoresPoroes[3])) * 0.04;

    cascoVisual.rotation.z = THREE.MathUtils.degToRad(banda);
    cascoVisual.rotation.x = THREE.MathUtils.degToRad(trim);

    listaLastros.forEach((v, i) => v.scale.y = Math.max(0.001, l[i]/150));

    document.getElementById('statusTxt').innerHTML = `BANDA: ${banda.toFixed(1)}° | TRIM: ${trim.toFixed(1)}°<br>
                           CARGA: ${pesoCarga.toFixed(0)}/360u | TOTAL: ${pesoTotal.toFixed(0)}u`;
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", atualizar));

function animate() {
    requestAnimationFrame(animate);
    const tempo = Date.now() * 0.001;
    const vertices = seaGeo.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        vertices[i+2] = Math.sin(vertices[i] * 0.01 + tempo) * 2;
    }
    seaGeo.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
}
atualizar();
animate();
</script>
</body>
</html>
